name: CI

# Add `develop` alongside `main` if you run a staging branch:
#   branches: [main, develop]
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref — a new push makes the previous run moot.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Keep in sync with the root package.json "packageManager" field.
env:
  PNPM_VERSION: 9.12.0

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Surfaces per App Profile: mobile + admin (+ api). There is no `web` app.
      # Only what EXISTS is gated. Uncomment each app's step in the milestone that creates it —
      # a CI job that greens on a package with no code teaches everyone to ignore CI.
      - name: Type check api
        run: pnpm --filter api type-check

      - name: Type check shared lib
        run: pnpm --filter @spotkey/common type-check

      - name: Type check mobile theme
        run: pnpm --filter @spotkey/mobile-ui type-check

      # - name: Type check admin        # enable in v0.6 (admin panel)
      #   run: pnpm --filter admin type-check
      # - name: Type check mobile       # enable in v0.1-G (first Expo screens)
      #   run: pnpm --filter mobile type-check

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run shared-lib tests
        run: pnpm test:common

      - name: Run backend tests
        run: pnpm test:api

      # - name: Run admin tests         # enable in v0.6
      #   run: pnpm test:admin
      # - name: Run mobile tests        # enable in v0.1-G
      #   run: pnpm test:mobile

  build:
    name: Build
    runs-on: ubuntu-latest
    # Build only after lint + tests pass — fail fast on the cheap checks first.
    needs: [lint-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

  # ── E2E ──────────────────────────────────────────────────────────────────
  # Testing profile is `full`, so E2E gates CI. Two runners, because the product
  # is the Expo app but the admin panel is on the critical path (moderation is the
  # only safety net now that space approval is gone):
  #   - Maestro drives the mobile critical journeys
  #   - Playwright drives the admin critical journeys
  #
  # Commented until apps/mobile and apps/admin actually exist — uncomment at the
  # end of the first implementation milestone, not before, or CI red-lines on an
  # empty workspace and everyone learns to ignore it.
